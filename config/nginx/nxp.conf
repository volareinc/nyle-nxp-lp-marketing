# nginx設定ファイル: nxp.nyle.co.jp
# 配置場所: /etc/nginx/conf.d/nxp.conf または /etc/nginx/sites-available/nxp.conf

# HTTPからHTTPSへのリダイレクト（ALB経由の場合は不要）
server {
    listen 80;
    server_name nxp.nyle.co.jp;
    return 301 https://$server_name$request_uri;
}

# メインサーバー設定
server {
    listen 80;
    listen [::]:80;
    server_name nxp.nyle.co.jp;

    # ドキュメントルート
    root /var/www/nxp-marketing-site;
    index index.html;

    # アクセスログ
    access_log /var/log/nginx/nxp-access.log combined;
    error_log /var/log/nginx/nxp-error.log warn;

    # セキュリティヘッダー
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip圧縮
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    # ====================================
    # リダイレクト設定
    # ====================================

    # ルートアクセス → /marketing/
    location = / {
        return 302 /marketing/;
    }

    # /ebook/ → /ebook/marketing/
    location = /ebook {
        return 302 /ebook/marketing/;
    }
    location = /ebook/ {
        return 302 /ebook/marketing/;
    }

    # 旧URL → 新URL（301 Permanent Redirect）
    # /nxp-contact/* → /contact/*
    location ~ ^/nxp-contact(/.*)?$ {
        return 301 /contact$1;
    }

    # /nxp-service/* → /ebook/marketing/*
    location ~ ^/nxp-service(/.*)?$ {
        return 301 /ebook/marketing$1;
    }

    # /entry/form.html → /entry/form/
    location = /entry/form.html {
        return 301 /entry/form/;
    }

    # ====================================
    # 静的ファイル配信
    # ====================================

    # アセットファイルのキャッシュ設定
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTMLファイルはキャッシュしない
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # クリーンURL対応（拡張子なしでアクセス）
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    # 404エラーページ
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # robots.txt（必要に応じて配置）
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # favicon.ico
    location = /favicon.ico {
        alias /var/www/nxp-marketing-site/assets/img/favicon.ico;
        log_not_found off;
        access_log off;
    }

    # .htaccess等の隠しファイルへのアクセス拒否
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ====================================
# 旧ドメイン（x.seohacks.net）からのリダイレクト
# ====================================
# 注意: 旧ドメインのDNSがこのサーバーを向いている場合のみ有効

server {
    listen 80;
    server_name x.seohacks.net;

    # ルート
    location = / {
        return 301 https://nxp.nyle.co.jp/marketing/;
    }

    # /nxp-contact/* → https://nxp.nyle.co.jp/contact/*
    location ~ ^/nxp-contact(/.*)?$ {
        return 301 https://nxp.nyle.co.jp/contact$1;
    }

    # /nxp-service/* → https://nxp.nyle.co.jp/ebook/marketing/*
    location ~ ^/nxp-service(/.*)?$ {
        return 301 https://nxp.nyle.co.jp/ebook/marketing$1;
    }

    # /entry/* → https://nxp.nyle.co.jp/entry/*
    location ~ ^/entry(/.*)?$ {
        return 301 https://nxp.nyle.co.jp/entry$1;
    }

    # その他のパス
    location / {
        return 301 https://nxp.nyle.co.jp/marketing/;
    }
}
