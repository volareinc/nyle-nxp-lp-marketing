server {
    listen 80;
    listen [::]:80;

    server_name dev.nxp.nyle.co.jp;

    access_log /var/log/nginx/dev.nxp.nyle.co.jp_access.log main;
    error_log  /var/log/nginx/dev.nxp.nyle.co.jp_error.log;

    root /var/www/dev.nxp.nyle.co.jp;
    index index.html;

    # Basic認証（開発環境だけ）
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd-dev-nxp;

    # --- Security headers (safe defaults for static SPA) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # HSTS はALBでHTTPS終端のためここでは付けない（誤設定防止）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # CSP は壊れやすいのでまず Report-Only
    add_header Content-Security-Policy-Report-Only "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none';" always;

    # --- gzip (improve transfer size) ---
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
      text/plain
      text/css
      text/javascript
      application/javascript
      application/json
      application/xml
      image/svg+xml;

    # --- Block sensitive / dotfiles ---
    location ~* /\.(?!well-known/) { return 404; }
    location ~* /(composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|README\.md|LICENSE|\.env) { return 404; }

    # health check（Basic認証なし）
    location = /healthz {
        auth_basic off;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    # ====================================
    # Trailing slash normalization
    # ====================================
    # スラッシュなしのURLをスラッシュ付きに正規化（301リダイレクト）

    location = /marketing {
        return 301 /marketing/;
    }

    location = /contact {
        return 301 /contact/;
    }

    location = /entry {
        return 301 /entry/;
    }

    location = /ai {
        return 301 /ai/;
    }

    location = /ebook {
        return 301 /ebook/;
    }

    location = /ebook/marketing {
        return 301 /ebook/marketing/;
    }

    # ====================================
    # Path redirects
    # ====================================

    # /ebook/ → /ebook/marketing/
    location = /ebook/ {
        return 301 /ebook/marketing/;
    }

    # --- index.html: no-store (exact-match to beat ^~ locations) ---
    location = /index.html {
        add_header Cache-Control "no-store";
    }
    location = /marketing/index.html {
        add_header Cache-Control "no-store";
    }
    location = /ai/index.html {
        add_header Cache-Control "no-store";
    }
    location = /contact/index.html {
        add_header Cache-Control "no-store";
    }
    location = /entry/index.html {
        add_header Cache-Control "no-store";
    }
    location = /ebook/marketing/index.html {
        add_header Cache-Control "no-store";
    }

    # --- Cache rules (optimized & deduped) ---
    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }
    location ^~ /static/ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }
    location ^~ /build/ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }
    location ^~ /dist/ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }
    location ^~ /vite/ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }
    location ^~ /_next/static/ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }
    location ^~ /_nuxt/ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|ico|webp|svg|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # --- LP routes (SPA fallback) ---
    location ^~ /marketing/ {
        try_files $uri $uri/ /marketing/index.html;
    }

    location ^~ /ai/ {
        try_files $uri $uri/ /ai/index.html;
    }

    location ^~ /contact/ {
        try_files $uri $uri/ /contact/index.html;
    }

    location ^~ /entry/ {
        try_files $uri $uri/ /entry/index.html;
    }

    location ^~ /ebook/marketing/ {
        try_files $uri $uri/ /ebook/marketing/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
